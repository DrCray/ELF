<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Vocabulary Practice Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9fafb;
            color: #1f2937;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: #1e40af;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        button#toggleBtn {
            padding: 12px 24px;
            font-size: 1.1rem;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button#toggleBtn:hover {
            background-color: #2563eb;
        }
        button#toggleBtn.active {
            background-color: #10b981;
        }
        .question {
            background: white;
            padding: 8px 15px;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #3b82f6;
        }
        .question-text {
            font-size: 1.15rem;
            margin-bottom: 5px;
            color: #111827;
        }
        /* Style the select box itself */
        select.blank {
            font-size: 1.05rem;
            padding: 8px 12px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            background-color: white;
            min-width: 220px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Pastel colors for the select element */
        select.is-correct {
            background-color: #d1fae5 !important; /* Pastel Green */
            border-color: #10b981 !important;
            color: #065f46;
        }
        select.is-incorrect {
            background-color: #fee2e2 !important; /* Pastel Pink */
            border-color: #ef4444 !important;
            color: #991b1b;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            color: #6b7280;
            font-size: 0.95rem;
        }



        /* 1. Initialize the counter on the container */
        #quizContainer {
            counter-reset: question-counter;
        }

        /* 2. Increment and display the counter before each question text */
        .question-text::before {
            counter-increment: question-counter;
            content: counter(question-counter) ". ";
            font-weight: bold;
            color: #1e40af; /* Matches your header blue */
            margin-right: 8px;
        }



.print-section {
        background: #ffffff;
        padding: 30px;
        margin-top: 40px;
        border-top: 2px solid #e5e7eb;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .input-group {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .print-input {
        padding: 10px 15px;
        border: 2px solid #d1d5db;
        border-radius: 6px;
        font-size: 1rem;
        width: 200px;
    }
    .print-input:focus {
        outline: none;
        border-color: #3b82f6;
    }
    #printBtn {
        padding: 12px 30px;
        background-color: #1f2937;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }
    #printBtn:hover {
        background-color: #111827;
    }
    /* Hide this section and the toggle button when printing */
    @media print {
        .print-section, #toggleBtn, .header {
            display: none !important;
        }
        body {
            background-color: white;
            margin: 0;
            padding: 0;
        }
        .question {
            box-shadow: none;
            border: 1px solid #eee;
            break-inside: avoid;
        }
    }

        // Global State
        let isStudyMode = false;
        let userSelections = new Array(questions.length).fill("");

        const container = document.getElementById('quizContainer');
        const toggleBtn = document.getElementById('toggleBtn');

        function renderQuiz() {
            container.innerHTML = '';

            questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'question';

                const qText = document.createElement('div');
                qText.className = 'question-text';

                const parts = q.q.split('_____');

                // Create Select Element
                const select = document.createElement('select');
                select.className = 'blank';
                select.id = `q-${index}`;

                // Default Option
                const defaultOpt = document.createElement('option');
                defaultOpt.value = "";
                defaultOpt.textContent = "— choices —";
                select.appendChild(defaultOpt);

                q.opts.forEach((opt, i) => {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = opt;
                    select.appendChild(option);
                });

                // Event Listener for visual feedback
                select.addEventListener('change', (e) => {
                    if (isStudyMode) return; // Prevent changes in study mode

                    const val = e.target.value;
                    userSelections[index] = val; // Capture state
                    updateSelectStyle(select, val, q.correct);
                });

                // Build the question HTML
                qText.appendChild(document.createTextNode(parts[0]));
                qText.appendChild(select);
                qText.appendChild(document.createTextNode(parts[1] || ""));

                div.appendChild(qText);
                container.appendChild(div);

                // Set initial value from state (important for "Back to Practice")
                if (userSelections[index] !== "") {
                    select.value = userSelections[index];
                    updateSelectStyle(select, userSelections[index], q.correct);
                }
            });
        }

        function updateSelectStyle(selectEl, selectedVal, correctVal) {
            selectEl.classList.remove('is-correct', 'is-incorrect');

            if (selectedVal === "") return;

            if (parseInt(selectedVal) === correctVal) {
                selectEl.classList.add('is-correct');
            } else {
                selectEl.classList.add('is-incorrect');
            }
        }

        toggleBtn.addEventListener('click', () => {
            isStudyMode = !isStudyMode;

            if (isStudyMode) {
                toggleBtn.textContent = 'Back to Practice Test';
                toggleBtn.classList.add('active');

                // Show all correct answers but don't overwrite userSelections array
                questions.forEach((q, index) => {
                    const select = document.getElementById(`q-${index}`);
                    select.value = q.correct;
                    select.disabled = true;
                    updateSelectStyle(select, q.correct, q.correct);
                });
            } else {
                toggleBtn.textContent = 'Study Mode';
                toggleBtn.classList.remove('active');

                // Revert to user selections
                questions.forEach((q, index) => {
                    const select = document.getElementById(`q-${index}`);
                    select.disabled = false;
                    select.value = userSelections[index];
                    updateSelectStyle(select, userSelections[index], q.correct);
                });
            }
        });

        renderQuiz();

    <script>
document.getElementById('printBtn').addEventListener('click', () => {
    const name = document.getElementById('userName').value.trim();
    const id = document.getElementById('userId').value.trim();

    if (name.length < 2 || id.length < 2) {
        alert("Name and ID required for Print/Save to PDF");
        return;
    }

    // Set the document title dynamically so the "Save as PDF"
    // dialog uses the correct filename automatically.
    const originalTitle = document.title;
    document.title = `${name}-${id}-biz-exam-study-guide`;

    // Trigger print
    window.print();

    // Restore original title after print dialog closes
    setTimeout(() => {
        document.title = originalTitle;
    }, 100);
});
