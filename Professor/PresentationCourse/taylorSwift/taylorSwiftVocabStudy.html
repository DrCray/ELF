<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taylor Swift Vocabulary Cards</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #1a1a2e;
            color: #f0f0f0;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
        }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .vocab-card {
            background: linear-gradient(145deg, #2d2d44, #252536);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #39395a;
        }
        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border-color: #e94560;
        }
        .card-closed {
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #e94560;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-open {
            padding: 0;
            display: none;
        }
        .card-header {
            background-color: #e94560;
            color: white;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }
        .card-content {
            padding: 15px;
        }
        .definition {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #ccccdd;
        }
        .example {
            background-color: rgba(233, 69, 96, 0.1);
            border-left: 4px solid #e94560;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            line-height: 1.6;
            color: #aaccff;
        }
        .example-title {
            font-weight: bold;
            color: #e94560;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 8px 14px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ff5773;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #8888aa;
            font-size: 0.9rem;
        }
        .hint {
            text-align: center;
            margin-bottom: 20px;
            color: #8888aa;
            font-style: italic;
        }
/* Light mode (default) */
/* Light mode (default) - blue theme */
body.light-mode {
    background-color: #f8f9fa;
    color: #1d1d1f;
}

body.light-mode h1 {
    color: #1e40af;                       /* blue-700 */
    text-shadow: 0 0 8px rgba(30, 64, 175, 0.25);
}

body.light-mode .vocab-card {
    background: linear-gradient(145deg, #ffffff, #f0f5ff);  /* very light blue tint */
    border: 1px solid #dbeafe;            /* blue-100 */
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
}

body.light-mode .vocab-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    border-color: #3b82f6;                /* blue-500 */
}

body.light-mode .card-closed {
    color: #1e40af;                       /* blue-700 */
}

body.light-mode .card-header {
    background-color: #1e40af;            /* blue-700 */
    color: white;
}

body.light-mode .definition {
    color: #1E40AF;                    /* gray-500 — softer, less attention */
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 20px;
    background-color: rgba(59, 130, 246, 0.10);   /* light blue background */
    padding: .2rem .3rem;
    border-radius: 0 10px 10px 0;
    border-left: 5px solid #3b82f6;               /* blue-500, thicker border */

}

/* Example - more prominent */
body.light-mode .example {

    border-left: 5px solid #3b82f6;               /* blue-500, thicker border */
    padding: 16px 18px 16px 22px;
    border-radius: 0 10px 10px 0;
    color: #1e293b;                               /* slate-900 — dark text for contrast */
    line-height: 1.65;
    font-size: 1.08rem;
    font-weight: 500;                             /* slightly bolder */
    margin: 16px 0;
}

body.light-mode .example-title {
    color: #1d4ed8;                       /* blue-600 */
}

body.light-mode button {
    background-color: #1d4ed8;            /* blue-600 */
    color: white;
}

body.light-mode button:hover {
    background-color: #3b82f6;            /* blue-500 */
}

body.light-mode .hint,
body.light-mode footer {
    color: #4b5563;                       /* gray-600 */
}

/* Dark mode styles (what you already have, just scoped) */
body.dark-mode {
    background-color: #1a1a2e;
    color: #f0f0f0;
}

body.dark-mode h1 {
    color: #e94560;
    text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
}


/* ... your original dark styles can stay as they are ... */
    </style>
</head>
<body>
    <h1>Taylor Swift Vocabulary Cards</h1>
    <div class="hint">Click on any card to reveal the definition and example. Click again to close it.</div>
    
    <div class="controls">
        <button id="openAll">Open All Cards</button>
        <button id="closeAll">Close All Cards</button>
        <button id="themeToggle">Switch to Dark Mode</button>
    </div>
    
    <div class="cards-container" id="cardsContainer">
        <!-- Cards will be generated by JavaScript -->
    </div>
    
    <footer>
        Vocabulary extracted from "Taylor Swift: Mega Star, Best Friend" | Created for learning purposes
    </footer>

    <script>
        // Vocabulary data: word/phrase, definition, example
        const vocabulary = [
            {
                word: "phenomenon",
                definition: "A remarkable person, thing, or situation that is noticed because it is very successful or unusual.",
                example: "The viral dance video became a global phenomenon almost overnight."
            },
            {
                word: "remarkable",
                definition: "Worthy of attention; unusual or extraordinary in a way that surprises people.",
                example: "Her remarkable memory let her recite the whole poem after reading it once."
            },
            {
                word: "exemplified",
                definition: "Showed or illustrated something clearly by being a typical example of it.",
                example: "His calm response to the crisis exemplified true leadership."
            },
            {
                word: "relatable",
                definition: "Easy to understand or feel connected to because it reflects your own experiences.",
                example: "The novel's main character is so relatable that readers see themselves in her."
            },
            {
                word: "scrutiny",
                definition: "Close and careful examination or observation, often critical.",
                example: "The new policy came under intense public scrutiny after the report was released."
            },
            {
                word: "validation",
                definition: "The feeling that your thoughts or experiences are recognized as real and worthwhile.",
                example: "Praise from her mentor gave her the validation she had long needed."
            },
            {
                word: "insecurities",
                definition: "Feelings of doubt or anxiety about oneself; a lack of confidence.",
                example: "He hid his insecurities behind jokes, but inside he worried about fitting in."
            },
            {
                word: "complexities",
                definition: "The complicated parts or details that make something difficult to understand.",
                example: "The teacher explained the complexities of the legal system in simple terms."
            },
            {
                word: "engages",
                definition: "Actively connects or interacts with people to hold their interest.",
                example: "The host engages the audience by asking questions throughout the show."
            },
            {
                word: "fosters",
                definition: "Encourages the development or growth of something, such as a feeling or skill.",
                example: "A supportive classroom fosters confidence in shy students."
            },
            {
                word: "genuine",
                definition: "Real and sincere; not fake or pretended.",
                example: "Her genuine concern for her neighbors made everyone trust her."
            },
            {
                word: "loyalty",
                definition: "Strong support for and faithfulness to a person, group, or cause.",
                example: "The team's loyalty to their coach kept them united through a losing season."
            },
            {
                word: "revenue",
                definition: "The money that a business or organization receives, especially from sales.",
                example: "The bakery's revenue doubled after it started selling online."
            },
            {
                word: "highest-grossing",
                definition: "Earning the most money, especially compared with similar things.",
                example: "The film became the highest-grossing release of the year."
            },
            {
                word: "immense",
                definition: "Extremely large in size, amount, or degree.",
                example: "Building the bridge required an immense amount of steel and planning."
            },
            {
                word: "collective",
                definition: "Shared by or involving all members of a group; done together.",
                example: "Cleaning the park was a collective effort by the whole neighborhood."
            },
            {
                word: "significant",
                definition: "Large or important enough to have an effect or to be noticed.",
                example: "There was a significant drop in temperature after the storm passed."
            },
            {
                word: "ambition",
                definition: "A strong desire to achieve success, power, or an important goal.",
                example: "Her ambition to become a doctor pushed her through years of hard study."
            },
            {
                word: "artist",
                definition: "A person who creates art such as music or paintings with skill and imagination.",
                example: "The street artist drew a stunning portrait in just ten minutes."
            },
            {
                word: "mega",
                definition: "(informal) Extremely large, successful, or impressive.",
                example: "The concert was a mega event, with stadiums selling out in minutes."
            }
        ];

        // Function to create cards
        function createCards() {
            const container = document.getElementById('cardsContainer');
            
            vocabulary.forEach(item => {
                // Create card element
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.dataset.word = item.word;
                
                // Closed state
                const closedDiv = document.createElement('div');
                closedDiv.className = 'card-closed';
                closedDiv.textContent = item.word;
                
                // Open state
                const openDiv = document.createElement('div');
                openDiv.className = 'card-open';
                
                const header = document.createElement('div');
                header.className = 'card-header';
                header.textContent = item.word;
                
                const content = document.createElement('div');
                content.className = 'card-content';
                
                const definition = document.createElement('div');
                definition.className = 'definition';
                definition.innerHTML = `<strong>Definition:</strong> ${item.definition}`;
                
                const example = document.createElement('div');
                example.className = 'example';
                example.innerHTML = `<div class="example-title">Example</div>${item.example}`;
                
                content.appendChild(definition);
                content.appendChild(example);
                
                openDiv.appendChild(header);
                openDiv.appendChild(content);
                
                card.appendChild(closedDiv);
                card.appendChild(openDiv);
                
                // Add click event to toggle card
                card.addEventListener('click', function(e) {
                    // Don't toggle if clicking on buttons in controls
                    if (e.target.tagName === 'BUTTON') return;
                    
                    const isOpen = this.querySelector('.card-open').style.display === 'block';
                    
                    if (isOpen) {
                        this.querySelector('.card-open').style.display = 'none';
                        this.querySelector('.card-closed').style.display = 'flex';
                    } else {
                        this.querySelector('.card-open').style.display = 'block';
                        this.querySelector('.card-closed').style.display = 'none';
                    }
                });
                
                container.appendChild(card);
            });
        }

        // Function to open all cards
        function openAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'block';
                card.querySelector('.card-closed').style.display = 'none';
            });
        }

        // Function to close all cards
        function closeAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'none';
                card.querySelector('.card-closed').style.display = 'flex';
            });
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            createCards();
            
            // Add event listeners to buttons
            document.getElementById('openAll').addEventListener('click', openAllCards);
            document.getElementById('closeAll').addEventListener('click', closeAllCards);
        });
    </script>



<script>
// Theme toggle functionality
document.addEventListener('DOMContentLoaded', function() {
    const body = document.body;
    const toggleBtn = document.getElementById('themeToggle');

    // Set initial state (light mode by default)
    body.classList.add('light-mode');
    toggleBtn.textContent = 'Switch to Dark Mode';

    toggleBtn.addEventListener('click', function() {
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            toggleBtn.textContent = 'Switch to Light Mode';
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            toggleBtn.textContent = 'Switch to Dark Mode';
        }
    });

    // Optional: remember user's preference using localStorage
    // Uncomment if you want the choice to persist across page reloads

</body>
</html>
