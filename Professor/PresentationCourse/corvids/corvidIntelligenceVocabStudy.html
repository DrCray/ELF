<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remarkable Intelligence of the Corvid Birds - Vocabulary Cards</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #1a1a2e;
            color: #f0f0f0;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
        }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .vocab-card {
            background: linear-gradient(145deg, #2d2d44, #252536);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #39395a;
        }
        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border-color: #e94560;
        }
        .card-closed {
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #e94560;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-open {
            padding: 0;
            display: none;
        }
        .card-header {
            background-color: #e94560;
            color: white;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }
        .card-content {
            padding: 15px;
        }
        .definition {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #ccccdd;
        }
        .example {
            background-color: rgba(233, 69, 96, 0.1);
            border-left: 4px solid #e94560;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            line-height: 1.6;
            color: #aaccff;
        }
        .example-title {
            font-weight: bold;
            color: #e94560;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 8px 14px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ff5773;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #8888aa;
            font-size: 0.9rem;
        }
        .hint {
            text-align: center;
            margin-bottom: 20px;
            color: #8888aa;
            font-style: italic;
        }
body.light-mode {
    background-color: #f8f9fa;
    color: #1d1d1f;
}
body.light-mode h1 {
    color: #1e40af;
    text-shadow: 0 0 8px rgba(30, 64, 175, 0.25);
}
body.light-mode .vocab-card {
    background: linear-gradient(145deg, #ffffff, #f0f5ff);
    border: 1px solid #dbeafe;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
}
body.light-mode .vocab-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    border-color: #3b82f6;
}
body.light-mode .card-closed {
    color: #1e40af;
}
body.light-mode .card-header {
    background-color: #1e40af;
    color: white;
}
body.light-mode .definition {
    color: #1E40AF;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 20px;
    background-color: rgba(59, 130, 246, 0.10);
    padding: .2rem .3rem;
    border-radius: 0 10px 10px 0;
    border-left: 5px solid #3b82f6;
}
body.light-mode .example {
    border-left: 5px solid #3b82f6;
    padding: 16px 18px 16px 22px;
    border-radius: 0 10px 10px 0;
    color: #1e293b;
    line-height: 1.65;
    font-size: 1.08rem;
    font-weight: 500;
    margin: 16px 0;
}
body.light-mode .example-title {
    color: #1d4ed8;
}
body.light-mode button {
    background-color: #1d4ed8;
    color: white;
}
body.light-mode button:hover {
    background-color: #3b82f6;
}
body.light-mode .hint,
body.light-mode footer {
    color: #4b5563;
}
body.dark-mode {
    background-color: #1a1a2e;
    color: #f0f0f0;
}
body.dark-mode h1 {
    color: #e94560;
    text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
}
    </style>
</head>
<body>
    <h1>Remarkable Intelligence of the Corvid Birds Vocabulary Cards</h1>
    <div class="hint">Click on any card to reveal the definition and example. Click again to close it.</div>

    <div class="controls">
        <button id="openAll">Open All Cards</button>
        <button id="closeAll">Close All Cards</button>
        <button id="themeToggle">Switch to Dark Mode</button>
    </div>

    <div class="cards-container" id="cardsContainer">
        <!-- Cards will be generated by JavaScript -->
    </div>

    <footer>
        Vocabulary extracted from "Remarkable Intelligence of the Corvid Birds" text | Created for learning purposes
    </footer>

    <script>
        const vocabulary = [{"word": "complex", "definition": "Made up of many interconnected parts; difficult to understand.", "example": "The tax code is so complex that most people hire an accountant to file their returns."}, {"word": "struggle", "definition": "To try hard to do something that is difficult.", "example": "New employees often struggle to remember everyone's name during their first week."}, {"word": "intelligent", "definition": "Having or showing a high level of mental ability.", "example": "The intelligent design of the new subway system cut commute times in half."}, {"word": "geniuses", "definition": "People with exceptional natural ability or intelligence.", "example": "The museum's exhibit celebrated history's greatest geniuses, from Einstein to Curie."}, {"word": "impressive", "definition": "Deserving admiration because of size, quality, or skill.", "example": "Her impressive presentation convinced the investors to fund the project."}, {"word": "abilities", "definition": "Skills or capacities needed to do something.", "example": "The coach designed drills that matched each player's individual abilities."}, {"word": "craft", "definition": "To make or produce something skillfully.", "example": "The carpenter can craft a beautiful chair from a single block of wood."}, {"word": "tasks", "definition": "Pieces of work that need to be done.", "example": "She organized her tasks by priority before starting the workday."}, {"word": "observed", "definition": "Watched carefully and attentively.", "example": "The researchers observed the wolves for months before publishing their findings."}, {"word": "bending", "definition": "Making something curved or angled rather than straight.", "example": "The gymnast is famous for bending her body into incredible shapes."}, {"word": "unique", "definition": "Being the only one of its kind; unlike anything else.", "example": "Every snowflake has a unique pattern that never repeats."}, {"word": "treated", "definition": "Behaved toward someone in a particular way.", "example": "She always treated her staff with respect, even during stressful deadlines."}, {"word": "bonds", "definition": "Close connections or relationships between people.", "example": "Years of traveling together created strong bonds among the team members."}, {"word": "literally", "definition": "In an exact, factual sense; used to emphasize that something is really true.", "example": "After the marathon, he was literally unable to walk up the stairs."}, {"word": "scarce", "definition": "Not enough of something; rare or hard to find.", "example": "Fresh water became scarce during the long summer drought."}, {"word": "dangling", "definition": "Hanging loosely.", "example": "A single light bulb was dangling from the ceiling of the old barn."}, {"word": "deception", "definition": "The act of deliberately making someone believe something that isn't true.", "example": "The con artist's whole business was built on deception."}, {"word": "caches", "definition": "Hidden stores of something, kept for future use.", "example": "Hikers sometimes leave caches of food and water along long desert trails."}, {"word": "elsewhere", "definition": "In, at, or to another place.", "example": "The restaurant was full, so we decided to eat elsewhere."}, {"word": "demonstrate", "definition": "To clearly show that something exists or is true.", "example": "The scientist used a simple experiment to demonstrate how pressure affects boiling point."}, {"word": "brainpower", "definition": "Mental ability or intelligence.", "example": "Solving the puzzle required more brainpower than any of us expected."}, {"word": "challenge", "definition": "To question whether something is true or correct; to test someone's abilities.", "example": "The new regulations challenge everything we thought we knew about the industry."}, {"word": "mindlessly", "definition": "Without thinking or paying attention.", "example": "He scrolled mindlessly through his phone during the entire meeting."}, {"word": "assessing", "definition": "Evaluating or judging the nature or quality of something.", "example": "The insurance agent spent an hour assessing the damage to the car."}, {"word": "behavior", "definition": "The way a person or animal acts or conducts itself.", "example": "The teacher praised the students for their excellent behavior on the field trip."}];

        function createCards() {
            const container = document.getElementById('cardsContainer');

            vocabulary.forEach(item => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.dataset.word = item.word;

                const closedDiv = document.createElement('div');
                closedDiv.className = 'card-closed';
                closedDiv.textContent = item.word;

                const openDiv = document.createElement('div');
                openDiv.className = 'card-open';

                const header = document.createElement('div');
                header.className = 'card-header';
                header.textContent = item.word;

                const content = document.createElement('div');
                content.className = 'card-content';

                const definition = document.createElement('div');
                definition.className = 'definition';
                definition.innerHTML = `<strong>Definition:</strong> ${item.definition}`;

                const example = document.createElement('div');
                example.className = 'example';
                example.innerHTML = `<div class="example-title">Example</div>${item.example}`;

                content.appendChild(definition);
                content.appendChild(example);

                openDiv.appendChild(header);
                openDiv.appendChild(content);

                card.appendChild(closedDiv);
                card.appendChild(openDiv);

                card.addEventListener('click', function(e) {
                    if (e.target.tagName === 'BUTTON') return;

                    const isOpen = this.querySelector('.card-open').style.display === 'block';

                    if (isOpen) {
                        this.querySelector('.card-open').style.display = 'none';
                        this.querySelector('.card-closed').style.display = 'flex';
                    } else {
                        this.querySelector('.card-open').style.display = 'block';
                        this.querySelector('.card-closed').style.display = 'none';
                    }
                });

                container.appendChild(card);
            });
        }

        function openAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'block';
                card.querySelector('.card-closed').style.display = 'none';
            });
        }

        function closeAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'none';
                card.querySelector('.card-closed').style.display = 'flex';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            createCards();

            document.getElementById('openAll').addEventListener('click', openAllCards);
            document.getElementById('closeAll').addEventListener('click', closeAllCards);
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const body = document.body;
    const toggleBtn = document.getElementById('themeToggle');

    body.classList.add('light-mode');
    toggleBtn.textContent = 'Switch to Dark Mode';

    toggleBtn.addEventListener('click', function() {
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            toggleBtn.textContent = 'Switch to Light Mode';
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            toggleBtn.textContent = 'Switch to Dark Mode';
        }
    });
});
</script>
</body>
</html>
