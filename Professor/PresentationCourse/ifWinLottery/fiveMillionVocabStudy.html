<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If I Won $5 Million Dollars - Vocabulary Cards</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #1a1a2e;
            color: #f0f0f0;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
        }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .vocab-card {
            background: linear-gradient(145deg, #2d2d44, #252536);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #39395a;
        }
        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border-color: #e94560;
        }
        .card-closed {
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #e94560;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-open {
            padding: 0;
            display: none;
        }
        .card-header {
            background-color: #e94560;
            color: white;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }
        .card-content {
            padding: 15px;
        }
        .definition {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #ccccdd;
        }
        .example {
            background-color: rgba(233, 69, 96, 0.1);
            border-left: 4px solid #e94560;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            line-height: 1.6;
            color: #aaccff;
        }
        .example-title {
            font-weight: bold;
            color: #e94560;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 8px 14px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ff5773;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #8888aa;
            font-size: 0.9rem;
        }
        .hint {
            text-align: center;
            margin-bottom: 20px;
            color: #8888aa;
            font-style: italic;
        }
body.light-mode {
    background-color: #f8f9fa;
    color: #1d1d1f;
}
body.light-mode h1 {
    color: #1e40af;
    text-shadow: 0 0 8px rgba(30, 64, 175, 0.25);
}
body.light-mode .vocab-card {
    background: linear-gradient(145deg, #ffffff, #f0f5ff);
    border: 1px solid #dbeafe;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
}
body.light-mode .vocab-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    border-color: #3b82f6;
}
body.light-mode .card-closed {
    color: #1e40af;
}
body.light-mode .card-header {
    background-color: #1e40af;
    color: white;
}
body.light-mode .definition {
    color: #1E40AF;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 20px;
    background-color: rgba(59, 130, 246, 0.10);
    padding: .2rem .3rem;
    border-radius: 0 10px 10px 0;
    border-left: 5px solid #3b82f6;
}
body.light-mode .example {
    border-left: 5px solid #3b82f6;
    padding: 16px 18px 16px 22px;
    border-radius: 0 10px 10px 0;
    color: #1e293b;
    line-height: 1.65;
    font-size: 1.08rem;
    font-weight: 500;
    margin: 16px 0;
}
body.light-mode .example-title {
    color: #1d4ed8;
}
body.light-mode button {
    background-color: #1d4ed8;
    color: white;
}
body.light-mode button:hover {
    background-color: #3b82f6;
}
body.light-mode .hint,
body.light-mode footer {
    color: #4b5563;
}
body.dark-mode {
    background-color: #1a1a2e;
    color: #f0f0f0;
}
body.dark-mode h1 {
    color: #e94560;
    text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
}
    </style>
</head>
<body>
    <h1>If I Won $5 Million Dollars Vocabulary Cards</h1>
    <div class="hint">Click on any card to reveal the definition and example. Click again to close it.</div>

    <div class="controls">
        <button id="openAll">Open All Cards</button>
        <button id="closeAll">Close All Cards</button>
        <button id="themeToggle">Switch to Dark Mode</button>
    </div>

    <div class="cards-container" id="cardsContainer">
        <!-- Cards will be generated by JavaScript -->
    </div>

    <footer>
        Vocabulary extracted from "If I Won $5 Million Dollars" text | Created for learning purposes
    </footer>

    <script>
        const vocabulary = [{"word": "life-changing", "definition": "having a major, lasting effect on someone's life.", "example": "Moving abroad for university was a life-changing experience for Maria."}, {"word": "reckless", "definition": "acting without thinking carefully about danger or consequences.", "example": "Driving that fast in the rain was reckless."}, {"word": "reflection", "definition": "careful thought or consideration over a period of time.", "example": "After months of reflection, he decided to change careers."}, {"word": "devised", "definition": "planned or invented something using clever thinking.", "example": "The team devised a new strategy to increase sales."}, {"word": "frivolity", "definition": "a lack of seriousness; playful or unnecessary spending or behavior.", "example": "The wedding was full of frivolity, from confetti cannons to a chocolate fountain."}, {"word": "generosity", "definition": "the quality of being kind and giving more than expected.", "example": "Her generosity was clear when she donated half her prize money to charity."}, {"word": "fulfillment", "definition": "a feeling of satisfaction from achieving something meaningful.", "example": "He found real fulfillment in volunteering at the animal shelter."}, {"word": "allocate", "definition": "to give a particular amount of money or resources for a specific purpose.", "example": "The city plans to allocate more funds to public parks next year."}, {"word": "luxuries", "definition": "expensive things that are pleasant but not necessary.", "example": "After years of saving, she finally allowed herself a few luxuries, like weekly massages."}, {"word": "luxurious", "definition": "very comfortable, elegant, and expensive.", "example": "The couple spent their anniversary in a luxurious beachfront villa."}, {"word": "extravagant", "definition": "spending much more money than necessary; elaborate.", "example": "His extravagant birthday party included a live band and a fireworks display."}, {"word": "invest", "definition": "to put money into something to gain a profit or benefit later.", "example": "She decided to invest in a new laptop to help with her freelance work."}, {"word": "high-end", "definition": "of the highest quality or price range.", "example": "The store specializes in high-end kitchen appliances."}, {"word": "reclining", "definition": "leaning back into a relaxed, comfortable position.", "example": "He spent the afternoon reclining on the sofa, watching movies."}, {"word": "enhance", "definition": "to improve the quality or value of something.", "example": "Adding fresh herbs can enhance the flavor of a simple soup."}, {"word": "spacious", "definition": "having a lot of space; roomy.", "example": "Their new apartment has a spacious kitchen perfect for entertaining guests."}, {"word": "portion", "definition": "a part or share of a whole.", "example": "She set aside a portion of her paycheck for savings each month."}, {"word": "dedicated", "definition": "set apart or committed for a specific purpose.", "example": "The company dedicated an entire floor to research and development."}, {"word": "stability", "definition": "the state of being steady and not likely to change suddenly.", "example": "After changing jobs twice, he was finally looking for career stability."}, {"word": "diversified", "definition": "made up of many different types, especially to spread out risk.", "example": "Financial advisors often recommend a diversified portfolio to reduce risk."}, {"word": "speculation", "definition": "investing in something risky in hopes of a big profit, without solid evidence.", "example": "Buying that stock was pure speculation; the company had no proven product yet."}, {"word": "upscale", "definition": "relating to expensive, high-quality goods, services, or areas.", "example": "They opened a new upscale restaurant downtown."}, {"word": "stable", "definition": "not likely to change or fail; secure.", "example": "After years of struggle, the small business finally had a stable income."}, {"word": "assess", "definition": "to carefully evaluate or judge a situation.", "example": "The teacher likes to assess each student's progress at the end of the term."}, {"word": "underprivileged", "definition": "lacking the basic advantages or resources most people have.", "example": "The charity provides school supplies to underprivileged children in the community."}, {"word": "ensure", "definition": "to make certain that something will happen.", "example": "Please double-check the tickets to ensure we have the correct dates."}, {"word": "impact", "definition": "a powerful effect or influence.", "example": "The new recycling program had a huge impact on the town's waste levels."}, {"word": "philanthropy", "definition": "the practice of donating money or time to help others.", "example": "His philanthropy funded three new schools in rural areas."}, {"word": "long-term", "definition": "relating to a long period of time in the future.", "example": "Eating well is a long-term investment in your health."}];

        function createCards() {
            const container = document.getElementById('cardsContainer');

            vocabulary.forEach(item => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.dataset.word = item.word;

                const closedDiv = document.createElement('div');
                closedDiv.className = 'card-closed';
                closedDiv.textContent = item.word;

                const openDiv = document.createElement('div');
                openDiv.className = 'card-open';

                const header = document.createElement('div');
                header.className = 'card-header';
                header.textContent = item.word;

                const content = document.createElement('div');
                content.className = 'card-content';

                const definition = document.createElement('div');
                definition.className = 'definition';
                definition.innerHTML = `<strong>Definition:</strong> ${item.definition}`;

                const example = document.createElement('div');
                example.className = 'example';
                example.innerHTML = `<div class="example-title">Example</div>${item.example}`;

                content.appendChild(definition);
                content.appendChild(example);

                openDiv.appendChild(header);
                openDiv.appendChild(content);

                card.appendChild(closedDiv);
                card.appendChild(openDiv);

                card.addEventListener('click', function(e) {
                    if (e.target.tagName === 'BUTTON') return;

                    const isOpen = this.querySelector('.card-open').style.display === 'block';

                    if (isOpen) {
                        this.querySelector('.card-open').style.display = 'none';
                        this.querySelector('.card-closed').style.display = 'flex';
                    } else {
                        this.querySelector('.card-open').style.display = 'block';
                        this.querySelector('.card-closed').style.display = 'none';
                    }
                });

                container.appendChild(card);
            });
        }

        function openAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'block';
                card.querySelector('.card-closed').style.display = 'none';
            });
        }

        function closeAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'none';
                card.querySelector('.card-closed').style.display = 'flex';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            createCards();

            document.getElementById('openAll').addEventListener('click', openAllCards);
            document.getElementById('closeAll').addEventListener('click', closeAllCards);
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const body = document.body;
    const toggleBtn = document.getElementById('themeToggle');

    body.classList.add('light-mode');
    toggleBtn.textContent = 'Switch to Dark Mode';

    toggleBtn.addEventListener('click', function() {
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            toggleBtn.textContent = 'Switch to Light Mode';
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            toggleBtn.textContent = 'Switch to Dark Mode';
        }
    });
});
</script>
</body>
</html>
