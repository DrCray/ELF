<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Soccer Is the World's Most Popular Sport - Vocabulary Cards</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #1a1a2e;
            color: #f0f0f0;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
        }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .vocab-card {
            background: linear-gradient(145deg, #2d2d44, #252536);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #39395a;
        }
        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border-color: #e94560;
        }
        .card-closed {
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #e94560;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-open {
            padding: 0;
            display: none;
        }
        .card-header {
            background-color: #e94560;
            color: white;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }
        .card-content {
            padding: 15px;
        }
        .definition {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #ccccdd;
        }
        .example {
            background-color: rgba(233, 69, 96, 0.1);
            border-left: 4px solid #e94560;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            line-height: 1.6;
            color: #aaccff;
        }
        .example-title {
            font-weight: bold;
            color: #e94560;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 8px 14px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ff5773;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #8888aa;
            font-size: 0.9rem;
        }
        .hint {
            text-align: center;
            margin-bottom: 20px;
            color: #8888aa;
            font-style: italic;
        }
body.light-mode {
    background-color: #f8f9fa;
    color: #1d1d1f;
}
body.light-mode h1 {
    color: #1e40af;
    text-shadow: 0 0 8px rgba(30, 64, 175, 0.25);
}
body.light-mode .vocab-card {
    background: linear-gradient(145deg, #ffffff, #f0f5ff);
    border: 1px solid #dbeafe;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
}
body.light-mode .vocab-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    border-color: #3b82f6;
}
body.light-mode .card-closed {
    color: #1e40af;
}
body.light-mode .card-header {
    background-color: #1e40af;
    color: white;
}
body.light-mode .definition {
    color: #1E40AF;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 20px;
    background-color: rgba(59, 130, 246, 0.10);
    padding: .2rem .3rem;
    border-radius: 0 10px 10px 0;
    border-left: 5px solid #3b82f6;
}
body.light-mode .example {
    border-left: 5px solid #3b82f6;
    padding: 16px 18px 16px 22px;
    border-radius: 0 10px 10px 0;
    color: #1e293b;
    line-height: 1.65;
    font-size: 1.08rem;
    font-weight: 500;
    margin: 16px 0;
}
body.light-mode .example-title {
    color: #1d4ed8;
}
body.light-mode button {
    background-color: #1d4ed8;
    color: white;
}
body.light-mode button:hover {
    background-color: #3b82f6;
}
body.light-mode .hint,
body.light-mode footer {
    color: #4b5563;
}
body.dark-mode {
    background-color: #1a1a2e;
    color: #f0f0f0;
}
body.dark-mode h1 {
    color: #e94560;
    text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
}
    </style>
</head>
<body>
    <h1>Why Soccer Is the World's Most Popular Sport Vocabulary Cards</h1>
    <div class="hint">Click on any card to reveal the definition and example. Click again to close it.</div>

    <div class="controls">
        <button id="openAll">Open All Cards</button>
        <button id="closeAll">Close All Cards</button>
        <button id="themeToggle">Switch to Dark Mode</button>
    </div>

    <div class="cards-container" id="cardsContainer">
        <!-- Cards will be generated by JavaScript -->
    </div>

    <footer>
        Vocabulary extracted from "Why Soccer Is the World's Most Popular Sport" text | Created for learning purposes
    </footer>

    <script>
        const vocabulary = [{"word": "passion", "definition": "A very strong feeling of enthusiasm or love for something.", "example": "Her passion for painting was obvious every time she picked up a brush."}, {"word": "simple", "definition": "Easy to understand or do; not complicated.", "example": "The recipe was simple enough for a beginner to follow without any trouble."}, {"word": "appeal", "definition": "The quality of being attractive or interesting to someone.", "example": "The appeal of the small mountain town was its peaceful, slow pace of life."}, {"word": "uniform", "definition": "A special set of clothes worn by members of a particular group or team.", "example": "Each player was given a new uniform with the team's colors before the season began."}, {"word": "dusty", "definition": "Covered with, or full of, fine dry dirt or dust.", "example": "We found an old, dusty box of photographs in the attic."}, {"word": "accessibility", "definition": "The quality of being easy to obtain, use, or take part in.", "example": "The new ramp improved accessibility for wheelchair users entering the building."}, {"word": "universal", "definition": "Involving or shared by everyone; found everywhere.", "example": "Music is often described as a universal language that people everywhere can understand."}, {"word": "glued", "definition": "(informal) Completely focused on something and unable to look away.", "example": "The children stayed glued to the television during their favorite cartoon."}, {"word": "monumental", "definition": "Extremely large, important, or impressive.", "example": "Winning the championship was a monumental achievement for the small school."}, {"word": "traverse", "definition": "To travel across or through an area.", "example": "The hikers had to traverse a rocky valley before reaching the summit."}, {"word": "mesmerizing", "definition": "So interesting or beautiful that you cannot look away.", "example": "The dancer's movements were mesmerizing, and the audience sat in complete silence."}, {"word": "mount a comeback", "definition": "To make a strong effort to recover after falling behind or losing.", "example": "Down by twenty points at halftime, the team managed to mount a comeback and win the game."}, {"word": "dramatic", "definition": "Sudden, striking, or exciting.", "example": "There was a dramatic change in the weather just before the storm arrived."}, {"word": "unpredictability", "definition": "The quality of being impossible to know or guess in advance.", "example": "Part of the fun of the game show was its unpredictability — no one ever knew who would win."}, {"word": "unite", "definition": "To bring people together for a common purpose.", "example": "The charity concert managed to unite fans from many different countries for one good cause."}, {"word": "gather", "definition": "To come together in a group.", "example": "Every Sunday, the whole family would gather around the dinner table to share a meal."}, {"word": "celebrate", "definition": "To do something enjoyable to mark a special event or achievement.", "example": "The whole office went out to celebrate after finishing the big project."}, {"word": "rulebook", "definition": "A book or set of rules that explains how something should be done.", "example": "The new referee studied the rulebook carefully before her first match."}, {"word": "wonderful", "definition": "Extremely good, pleasant, or enjoyable.", "example": "We had a wonderful time exploring the old city on our vacation."}];

        function createCards() {
            const container = document.getElementById('cardsContainer');

            vocabulary.forEach(item => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.dataset.word = item.word;

                const closedDiv = document.createElement('div');
                closedDiv.className = 'card-closed';
                closedDiv.textContent = item.word;

                const openDiv = document.createElement('div');
                openDiv.className = 'card-open';

                const header = document.createElement('div');
                header.className = 'card-header';
                header.textContent = item.word;

                const content = document.createElement('div');
                content.className = 'card-content';

                const definition = document.createElement('div');
                definition.className = 'definition';
                definition.innerHTML = `<strong>Definition:</strong> ${item.definition}`;

                const example = document.createElement('div');
                example.className = 'example';
                example.innerHTML = `<div class="example-title">Example</div>${item.example}`;

                content.appendChild(definition);
                content.appendChild(example);

                openDiv.appendChild(header);
                openDiv.appendChild(content);

                card.appendChild(closedDiv);
                card.appendChild(openDiv);

                card.addEventListener('click', function(e) {
                    if (e.target.tagName === 'BUTTON') return;

                    const isOpen = this.querySelector('.card-open').style.display === 'block';

                    if (isOpen) {
                        this.querySelector('.card-open').style.display = 'none';
                        this.querySelector('.card-closed').style.display = 'flex';
                    } else {
                        this.querySelector('.card-open').style.display = 'block';
                        this.querySelector('.card-closed').style.display = 'none';
                    }
                });

                container.appendChild(card);
            });
        }

        function openAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'block';
                card.querySelector('.card-closed').style.display = 'none';
            });
        }

        function closeAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'none';
                card.querySelector('.card-closed').style.display = 'flex';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            createCards();

            document.getElementById('openAll').addEventListener('click', openAllCards);
            document.getElementById('closeAll').addEventListener('click', closeAllCards);
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const body = document.body;
    const toggleBtn = document.getElementById('themeToggle');

    body.classList.add('light-mode');
    toggleBtn.textContent = 'Switch to Dark Mode';

    toggleBtn.addEventListener('click', function() {
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            toggleBtn.textContent = 'Switch to Light Mode';
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            toggleBtn.textContent = 'Switch to Dark Mode';
        }
    });
});
</script>
</body>
</html>
