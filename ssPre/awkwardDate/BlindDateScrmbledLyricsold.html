<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scramble Lyrics - Interactive Exercise</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;display=swap');
        
        :root {
            --primary: #4ade80;
        }
        
        body {
            font-family: 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #a5b4fc;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        
        .section {
            background: #1e2937;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #334155;
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #c4d0ff;
        }
        
        .lyrics-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .lyrics-item {
            background: #334155;
            padding: 14px 18px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .lyrics-item:hover {
            background: #475569;
            transform: translateX(4px);
        }
        
        .lyrics-item.selected {
            background: #6366f1;
            border-left-color: #a5b4fc;
            color: white;
        }
        
        .lyrics-item.correct {
            border-left-color: #4ade80;
            background: #14532d;
        }
        
        .lyrics-item .number {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
            width: 24px;
        }
        
        .lyrics-text {
            flex: 1;
        }
        
        .controls {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #6366f1;
            transform: translateY(-2px);
        }
        
        .reset-btn {
            background: #64748b;
        }
        
        .info {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 5px;
        }
        
        .footer {
            background: #1e2937;
            padding: 25px;
            border-radius: 12px;
            margin-top: 40px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        
        .form-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            color: #cbd5e1;
            font-weight: 500;
        }
        
        input {
            padding: 12px 16px;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
            width: 280px;
            transition: border 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #6366f1;
        }
        
        #printBtn {
            background: #22c55e;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        #printBtn:disabled {
            background: #64748b;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 15px;
            font-size: 0.95rem;
        }
        
        .progress {
            height: 6px;
            background: #334155;
            border-radius: 9999px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, #4ade80, #22d3ee);
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎤 Lyrics Scramble</h1>
            <p class="subtitle">Rearrange each section into the correct order. Click two lines to swap them.</p>
        </header>

        <div id="sections"></div>

        <div class="footer">
            <h2 style="margin-top:0; color:#a5b4fc;">Student Information</h2>
            <div class="form-group">
                <div>
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div>
                    <label for="id">Student ID</label>
                    <input type="text" id="id" placeholder="Enter your ID" required>
                </div>
            </div>
            
            <button id="printBtn" onclick="printExercise()">🖨️ Print / Save as PDF</button>
            <div class="status" id="status"></div>
        </div>
    </div>
<script>
const lyricsSections = [
  [
    "Going out on the town tonight",
    "Blind date, take a chance tonight",
    "Don't know your face, don't know your name",
    "Tonight I'm stepping up my game"
  ],
  [
    "New shoes on and my hair pulled tight",
    "Little bit nervous but I feel alright",
    "Could be magic, could be strange",
    "But I'm ready for a little change"
  ],
  [
    "Heartbeat going boom-boom fast",
    "No looking back, no looking back",
    "Take a breath, let's make it last",
    "No strings attached, no strings attached"
  ],
  [
    "Take a chance, take a chance",
    "I'm stepping out to dance",
    "It's gonna be a good time, no matter what",
    "Even if the sparks don't light it up",
    "I'm gonna shine so bright tonight",
    "Yeah, I'm gonna make it right"
  ],
  [
    "It's gonna be a good time, wait and see",
    "Even if it's not meant to be",
    "I'm here to laugh, I'm here to vibe",
    "Best night of my life",
    "Good time, good time first",
    "Yeah, we're feeling alright",
    "Good time, good time second",
    "Dancing under the lights"
  ],
  [
    "Saw you coming through the door",
    "A smile I've never seen before",
    "Maybe fate's got funny ways",
    "Bringing strangers face to face"
  ],
  [
    "We talk fast and we talk slow",
    "Where this goes, nobody knows",
    "But the music's pulling close",
    "And I kinda like it most"
  ],
  [
    "Heartbeat going boom-boom fast",
    "No looking back, no looking back",
    "Hands up high, forget the past",
    "We're in the now, we're in the now"
  ],
  [
    "Just a moment in the spotlight",
    "Maybe this is just one night",
    "Maybe this could feel so right",
    "Either way I'm not afraid",
    "Every risk is worth the play"
  ],
  [
    "Take a chance, take a chance",
    "Life's too short to stand and wait",
    "No regrets when morning comes",
    "We're too young to play it numb"
  ]
];

let sections = [];
let currentSelections = {};

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function countFixedPoints(arr, original) {
  let count = 0;
  for (let i = 0; i < arr.length; i++) {
    if (arr[i] === original[i]) count++;
  }
  return count;
}

function scrambleWithAtMostOneFixed(original) {
  const maxTries = 1000;

  for (let attempt = 0; attempt < maxTries; attempt++) {
    const arr = shuffle(original);
    if (countFixedPoints(arr, original) <= 1) {
      return arr;
    }
  }

  return shuffle(original);
}

function parseSections() {
  sections = lyricsSections.map((lines, index) => ({
    id: index,
    original: [...lines],
    current: scrambleWithAtMostOneFixed(lines)
  }));
}

function renderSections() {
  const container = document.getElementById("sections");
  container.innerHTML = "";

  sections.forEach((section, sIndex) => {
    const sectionEl = document.createElement("div");
    sectionEl.className = "section";

    let html = `
      <div class="section-header">
        <div class="section-title">Section ${sIndex + 1}</div>
        <button class="reset-btn" onclick="resetSection(${sIndex})">Reset Section</button>
      </div>
      <ul class="lyrics-list" id="list-${sIndex}">
    `;

    section.current.forEach((line, index) => {
      const isCorrect = line === section.original[index];
      const selected = currentSelections[sIndex] === index ? "selected" : "";

      html += `
        <li class="lyrics-item ${selected} ${isCorrect ? "correct" : ""}"
            data-section="${sIndex}"
            data-index="${index}"
            onclick="selectLines(${sIndex}, ${index})">
          <span class="number">${index + 1}.</span>
          <span class="lyrics-text">${line}</span>
        </li>
      `;
    });

    html += `
      </ul>
      <div class="info">Click two lines to swap them. Green border = correct position.</div>
    `;

    sectionEl.innerHTML = html;
    container.appendChild(sectionEl);
  });
}

function selectLines(sectionIndex, lineIndex) {
  if (currentSelections[sectionIndex] === undefined) {
    currentSelections[sectionIndex] = lineIndex;
    renderSections();
  } else {
    const first = currentSelections[sectionIndex];

    if (first !== lineIndex) {
      [sections[sectionIndex].current[first], sections[sectionIndex].current[lineIndex]] =
        [sections[sectionIndex].current[lineIndex], sections[sectionIndex].current[first]];
    }

    delete currentSelections[sectionIndex];
    renderSections();
  }
}

function resetSection(sectionIndex) {
  sections[sectionIndex].current = scrambleWithAtMostOneFixed(sections[sectionIndex].original);
  delete currentSelections[sectionIndex];
  renderSections();
}

function checkAllCorrect() {
  return sections.every(section =>
    section.current.every((line, i) => line === section.original[i])
  );
}

function printExercise() {
  const name = document.getElementById("name").value.trim();
  const id = document.getElementById("id").value.trim();
  const statusEl = document.getElementById("status");

  if (!name || !id) {
    statusEl.innerHTML = '<span style="color:#f87171;">Please enter both Name and Student ID before printing.</span>';
    return;
  }

  statusEl.innerHTML = '<span style="color:#4ade80;">Ready to print! Your browser’s print dialog will open.</span>';

  const printHeader = document.createElement("div");
  printHeader.style.cssText =
    "text-align:center;margin-bottom:30px;padding:15px;background:#1e293b;border-radius:8px;";
  printHeader.innerHTML = `
    <h2 style="margin:0 0 8px 0;color:#a5b4fc;">Lyrics Scramble Exercise</h2>
    <p><strong>Name:</strong> ${name} &nbsp;&nbsp; <strong>ID:</strong> ${id}</p>
    <p style="font-size:0.9rem;color:#64748b;">Completed on ${new Date().toLocaleDateString()}</p>
  `;

  const container = document.querySelector(".container");
  const firstSection = document.getElementById("sections");
  container.insertBefore(printHeader, firstSection);

  setTimeout(() => {
    window.print();
    setTimeout(() => printHeader.remove(), 500);
  }, 100);
}

parseSections();
renderSections();

document.addEventListener("keydown", e => {
  if (e.key === "r" && e.ctrlKey) {
    e.preventDefault();
    sections.forEach((_, i) => resetSection(i));
  }
});

window.addEventListener("beforeprint", () => {
  const name = document.getElementById("name").value.trim();
  const id = document.getElementById("id").value.trim();

  if (!name || !id) {
    alert("Please fill in your Name and ID before printing!");
    window.stop();
  }
});
</script>
</body>
</html>
