<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anagram Game</title>
<style>

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #fafafa;
    color: #222;
  }

  /* ---------- Fixed game bar ---------- */

  #gameBar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 100;
    background: #26215C;
    padding: clamp(0.5rem, 2vw, 1rem);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: clamp(0.5rem, 2vw, 1rem);
  }

  #scrambledLetters {
    display: flex;
    flex-wrap: nowrap;
    flex-basis: 100%;
    gap: var(--tile-gap);
    justify-content: center;
  }

  #barControls {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  #barControls button {
    font-size: clamp(0.8rem, 2vw, 1rem);
    padding: 0.5rem 0.8rem;
    border: none;
    border-radius: 4px;
    background: #fafafa;
    color: #26215C;
    cursor: pointer;
  }

  #barControls button:hover {
    background: #e0dff5;
  }

  /* ---------- Shared tile style ---------- */

  :root {
    --tile-size: 2.6rem;
    --tile-gap: 0.4rem;
  }

  .tile {
    width: var(--tile-size);
    height: var(--tile-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--tile-size) * 0.5);
    font-weight: bold;
    text-transform: uppercase;
    border: 2px solid #26215C;
    border-radius: 4px;
    background: #fff;
    flex-shrink: 0;
  }

  .scrambled-tile {
    color: #fff;
    background: #26215C;
    border-color: #fff;
  }

  .answer-tile {
    cursor: pointer;
    padding: 0;
    color: #26215C;
  }

  .answer-tile:hover {
    background: #f0f0f8;
  }

  .answer-tile.revealed {
    background: #26215C;
    color: #fff;
  }

  /* ---------- Page content ---------- */

  #pageContent {
    max-width: 700px;
    margin: 0 auto;
    padding-left: clamp(1rem, 4vw, 2rem);
    padding-right: clamp(1rem, 4vw, 2rem);
    padding-bottom: 3rem;
  }

  #pageHeader {
    text-align: center;
    padding-top: 1.5rem;
  }

  #pageHeader h1 {
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    margin-bottom: 0.3rem;
  }

  .instructions {
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    color: #555;
  }

  /* ---------- Game section ---------- */

  .word-block {
    margin-top: 2rem;
  }

  .clue {
    font-size: clamp(0.95rem, 2.5vw, 1.1rem);
    margin-bottom: 0.6rem;
  }

  .letter-row {
    display: flex;
    flex-wrap: nowrap;
    gap: var(--tile-gap);
  }

</style>
</head>
<body>

  <!-- ============ FIXED GAME BAR ============ -->
  <div id="gameBar">
    <div id="scrambledLetters" aria-label="Scrambled master word"></div>
    <div id="barControls">
      <button id="shuffleBtn" type="button">Shuffle</button>
      <button id="studyModeBtn" type="button">Study Mode</button>
    </div>
  </div>

  <!-- ============ PAGE CONTENT ============ -->
  <main id="pageContent">

    <header id="pageHeader">
      <h1>Anagram Challenge</h1>
      <p class="instructions">
        The letters above can be rearranged to spell several words. Read each clue below,
        then click the empty boxes to reveal the letters of that word, one at a time.
      </p>
    </header>

    <section id="gameSection">
      <!-- Word blocks are generated by JavaScript -->
    </section>

  </main>

<script>

  // ===================================================
  // EDIT THIS VARIABLE TO MAKE A NEW GAME
  // One word + clue pair per line: word | clue
  // First line is always the master word.
  // ===================================================
  const WORD_LIST = `
    administration | to pay close attention
    silent | making no sound at all
    enlist | to join the military voluntarily
    tinsel | shiny metallic strips used as decoration
    inlets | narrow strips of water leading into land
  `;

  // ---------- Parse WORD_LIST into working data ----------
  const entries = WORD_LIST
    .trim()
    .split('\n')
    .map(line => line.trim())
    .filter(line => line.length > 0)
    .map(line => {
      const [word, clue] = line.split('|').map(s => s.trim());
      return { word: word.toUpperCase(), clue };
    });

  const MASTER_WORD = entries[0].word;

  // ---------- Fisher-Yates shuffle ----------
  function shuffle(array) {
    const arr = array.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ---------- Build scrambled master-word tiles ----------
  const scrambledContainer = document.getElementById('scrambledLetters');

  function renderScrambled() {
    scrambledContainer.innerHTML = '';
    const shuffled = shuffle(MASTER_WORD.split(''));
    shuffled.forEach(letter => {
      const tile = document.createElement('div');
      tile.className = 'tile scrambled-tile';
      tile.textContent = letter;
      scrambledContainer.appendChild(tile);
    });
  }
  renderScrambled();

  document.getElementById('shuffleBtn').addEventListener('click', renderScrambled);

  // ---------- Build clue + letter-box rows ----------
  const gameSection = document.getElementById('gameSection');

  entries.forEach((entry, entryIndex) => {
    const block = document.createElement('div');
    block.className = 'word-block';

    const clue = document.createElement('p');
    clue.className = 'clue';
    clue.textContent = entry.clue;
    block.appendChild(clue);

    const row = document.createElement('div');
    row.className = 'letter-row';

    entry.word.split('').forEach(letter => {
      const tile = document.createElement('button');
      tile.type = 'button';
      tile.className = 'tile answer-tile';
      tile.dataset.letter = letter;
      tile.dataset.revealed = 'false';
      tile.setAttribute('aria-label', 'Hidden letter, click to reveal');
      tile.addEventListener('click', () => toggleTile(tile));
      row.appendChild(tile);
    });

    block.appendChild(row);
    gameSection.appendChild(block);
  });

  function toggleTile(tile) {
    const revealed = tile.dataset.revealed === 'true';
    setTileRevealed(tile, !revealed);
  }

  function setTileRevealed(tile, revealed) {
    tile.dataset.revealed = revealed ? 'true' : 'false';
    tile.textContent = revealed ? tile.dataset.letter : '';
    tile.classList.toggle('revealed', revealed);
  }

  // ---------- Study Mode ----------
  const studyModeBtn = document.getElementById('studyModeBtn');
  let studyModeActive = false;
  let savedState = [];

  studyModeBtn.addEventListener('click', () => {
    const allAnswerTiles = document.querySelectorAll('.answer-tile');

    if (!studyModeActive) {
      // Entering study mode: snapshot current state, reveal everything
      savedState = Array.from(allAnswerTiles).map(t => t.dataset.revealed === 'true');
      allAnswerTiles.forEach(t => setTileRevealed(t, true));
      studyModeActive = true;
      studyModeBtn.textContent = 'Return to Puzzle';
    } else {
      // Returning to puzzle: restore snapshot
      allAnswerTiles.forEach((t, i) => setTileRevealed(t, savedState[i]));
      studyModeActive = false;
      studyModeBtn.textContent = 'Study Mode';
    }
  });

  // ---------- Uniform tile sizing ----------
  // All tiles (scrambled bar + every answer row) share one size, calculated
  // to fit the MASTER WORD on a single line. Since every anagram is made of
  // the same or fewer letters than the master word, anything that fits the
  // master word automatically fits every shorter word too.

  function pxFromRem(rem) {
    const rootFontSize = parseFloat(getComputedStyle(document.documentElement).fontSize);
    return rem * rootFontSize;
  }

  function computeAndApplyTileSize() {
    const n = MASTER_WORD.length;
    const gapPx = pxFromRem(0.4); // keep in sync with --tile-gap base value

    // Width available in the fixed bar (scrambled row spans the full bar width)
    const gameBar = document.getElementById('gameBar');
    const barStyles = getComputedStyle(gameBar);
    const barPadding = parseFloat(barStyles.paddingLeft) + parseFloat(barStyles.paddingRight);
    const barAvailable = gameBar.clientWidth - barPadding;

    // Width available in the page content column (constrains answer rows)
    const pageContent = document.getElementById('pageContent');
    const pcStyles = getComputedStyle(pageContent);
    const pcPadding = parseFloat(pcStyles.paddingLeft) + parseFloat(pcStyles.paddingRight);
    const contentAvailable = pageContent.clientWidth - pcPadding;

    const available = Math.min(barAvailable, contentAvailable);

    let tileSize = (available - (n - 1) * gapPx) / n;

    const minTile = 20; // px floor: keeps letters legible/tappable even for very long words
    const maxTile = 44; // px ceiling: keeps short words from looking oversized
    tileSize = Math.max(minTile, Math.min(maxTile, tileSize));

    document.documentElement.style.setProperty('--tile-size', tileSize + 'px');
    document.documentElement.style.setProperty('--tile-gap', gapPx + 'px');
  }

  // ---------- Keep page content clear of the fixed bar ----------
  function adjustBarOffset() {
    const barHeight = document.getElementById('gameBar').offsetHeight;
    document.getElementById('pageContent').style.paddingTop = barHeight + 'px';
  }

  function refreshLayout() {
    computeAndApplyTileSize();
    adjustBarOffset();
  }

  refreshLayout();
  window.addEventListener('load', refreshLayout);
  window.addEventListener('resize', refreshLayout);

</script>
</body>
</html>
