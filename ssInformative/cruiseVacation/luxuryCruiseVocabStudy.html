<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take a Luxury Cruise - Vocabulary Cards</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #1a1a2e;
            color: #f0f0f0;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
        }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .vocab-card {
            background: linear-gradient(145deg, #2d2d44, #252536);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #39395a;
        }
        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border-color: #e94560;
        }
        .card-closed {
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #e94560;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-open {
            padding: 0;
            display: none;
        }
        .card-header {
            background-color: #e94560;
            color: white;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }
        .card-content {
            padding: 15px;
        }
        .definition {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #ccccdd;
        }
        .example {
            background-color: rgba(233, 69, 96, 0.1);
            border-left: 4px solid #e94560;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            line-height: 1.6;
            color: #aaccff;
        }
        .example-title {
            font-weight: bold;
            color: #e94560;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 8px 14px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ff5773;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #8888aa;
            font-size: 0.9rem;
        }
        .hint {
            text-align: center;
            margin-bottom: 20px;
            color: #8888aa;
            font-style: italic;
        }
body.light-mode {
    background-color: #f8f9fa;
    color: #1d1d1f;
}
body.light-mode h1 {
    color: #1e40af;
    text-shadow: 0 0 8px rgba(30, 64, 175, 0.25);
}
body.light-mode .vocab-card {
    background: linear-gradient(145deg, #ffffff, #f0f5ff);
    border: 1px solid #dbeafe;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
}
body.light-mode .vocab-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    border-color: #3b82f6;
}
body.light-mode .card-closed {
    color: #1e40af;
}
body.light-mode .card-header {
    background-color: #1e40af;
    color: white;
}
body.light-mode .definition {
    color: #1E40AF;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 20px;
    background-color: rgba(59, 130, 246, 0.10);
    padding: .2rem .3rem;
    border-radius: 0 10px 10px 0;
    border-left: 5px solid #3b82f6;
}
body.light-mode .example {
    border-left: 5px solid #3b82f6;
    padding: 16px 18px 16px 22px;
    border-radius: 0 10px 10px 0;
    color: #1e293b;
    line-height: 1.65;
    font-size: 1.08rem;
    font-weight: 500;
    margin: 16px 0;
}
body.light-mode .example-title {
    color: #1d4ed8;
}
body.light-mode button {
    background-color: #1d4ed8;
    color: white;
}
body.light-mode button:hover {
    background-color: #3b82f6;
}
body.light-mode .hint,
body.light-mode footer {
    color: #4b5563;
}
body.dark-mode {
    background-color: #1a1a2e;
    color: #f0f0f0;
}
body.dark-mode h1 {
    color: #e94560;
    text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
}
    </style>
</head>
<body>
    <h1>Take a Luxury Cruise Vocabulary Cards</h1>
    <div class="hint">Click on any card to reveal the definition and example. Click again to close it.</div>

    <div class="controls">
        <button id="openAll">Open All Cards</button>
        <button id="closeAll">Close All Cards</button>
        <button id="themeToggle">Switch to Dark Mode</button>
    </div>

    <div class="cards-container" id="cardsContainer">
        <!-- Cards will be generated by JavaScript -->
    </div>

    <footer>
        Vocabulary extracted from "Take a Luxury Cruise" text | Created for learning purposes
    </footer>

    <script>
        const vocabulary = [{"word": "getaway", "definition": "A trip or vacation, especially a short escape from routine.", "example": "We booked a quick weekend getaway to the mountains to escape the city noise."}, {"word": "unplug", "definition": "To disconnect from technology, work, or daily stress in order to relax.", "example": "Every summer, my family tries to unplug completely and leave our phones at home."}, {"word": "fast pace", "definition": "A quick speed or rate at which something happens or moves.", "example": "Life in the city moves at such a fast pace that people rarely stop to rest."}, {"word": "draining", "definition": "Causing someone to feel physically or mentally exhausted.", "example": "Studying for three exams in one week was mentally draining."}, {"word": "sophisticated", "definition": "Having a high level of refinement, complexity, or luxury.", "example": "The hotel's sophisticated lobby featured marble floors and a grand chandelier."}, {"word": "hassles", "definition": "Annoying difficulties or inconveniences.", "example": "Renewing a passport can involve a lot of paperwork and hassles."}, {"word": "venturing", "definition": "Going somewhere new or risky, especially with a sense of adventure.", "example": "The scientists were venturing deep into the rainforest to study rare insects."}, {"word": "chaotic", "definition": "Disorganized and confusing; full of disorder.", "example": "The train station was chaotic during rush hour, with crowds pushing in every direction."}, {"word": "handles", "definition": "Manages or deals with something responsibly.", "example": "Our travel agent handles all the bookings, so we don't have to worry about anything."}, {"word": "logistics", "definition": "The detailed planning and coordination of a complex activity.", "example": "Organizing the wedding required careful attention to logistics, from seating to transportation."}, {"word": "excursions", "definition": "Short trips taken for pleasure or sightseeing, often as part of a larger trip.", "example": "The resort offers daily excursions to nearby waterfalls and coffee farms."}, {"word": "flexibility", "definition": "The ability to adapt or change easily to different situations.", "example": "Working from home gives employees more flexibility over their daily schedules."}, {"word": "customize", "definition": "To change something to suit personal needs or preferences.", "example": "Many gyms let members customize their own workout plans with a personal trainer."}, {"word": "adventure", "definition": "An exciting or unusual experience, often involving some risk.", "example": "Backpacking across South America alone was the adventure of a lifetime."}, {"word": "well-deserved", "definition": "Fully earned or merited, often after hard work.", "example": "After finishing the marathon, she treated herself to a well-deserved nap."}, {"word": "serene", "definition": "Calm, peaceful, and untroubled.", "example": "The garden's serene atmosphere made it the perfect place to read."}, {"word": "diverse", "definition": "Showing a wide variety; made up of many different types.", "example": "The city's food scene is incredibly diverse, with restaurants from every continent."}, {"word": "casinos", "definition": "Establishments where people gamble by playing games of chance.", "example": "The city's downtown area is famous for its glittering casinos and nightlife."}, {"word": "cuisines", "definition": "Styles of cooking, typically associated with a particular country or region.", "example": "The food festival featured cuisines from over twenty different countries."}, {"word": "appealing", "definition": "Attractive or interesting; likely to be liked.", "example": "The idea of working remotely from a beach became more appealing every winter."}];

        function createCards() {
            const container = document.getElementById('cardsContainer');

            vocabulary.forEach(item => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.dataset.word = item.word;

                const closedDiv = document.createElement('div');
                closedDiv.className = 'card-closed';
                closedDiv.textContent = item.word;

                const openDiv = document.createElement('div');
                openDiv.className = 'card-open';

                const header = document.createElement('div');
                header.className = 'card-header';
                header.textContent = item.word;

                const content = document.createElement('div');
                content.className = 'card-content';

                const definition = document.createElement('div');
                definition.className = 'definition';
                definition.innerHTML = `<strong>Definition:</strong> ${item.definition}`;

                const example = document.createElement('div');
                example.className = 'example';
                example.innerHTML = `<div class="example-title">Example</div>${item.example}`;

                content.appendChild(definition);
                content.appendChild(example);

                openDiv.appendChild(header);
                openDiv.appendChild(content);

                card.appendChild(closedDiv);
                card.appendChild(openDiv);

                card.addEventListener('click', function(e) {
                    if (e.target.tagName === 'BUTTON') return;

                    const isOpen = this.querySelector('.card-open').style.display === 'block';

                    if (isOpen) {
                        this.querySelector('.card-open').style.display = 'none';
                        this.querySelector('.card-closed').style.display = 'flex';
                    } else {
                        this.querySelector('.card-open').style.display = 'block';
                        this.querySelector('.card-closed').style.display = 'none';
                    }
                });

                container.appendChild(card);
            });
        }

        function openAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'block';
                card.querySelector('.card-closed').style.display = 'none';
            });
        }

        function closeAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'none';
                card.querySelector('.card-closed').style.display = 'flex';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            createCards();

            document.getElementById('openAll').addEventListener('click', openAllCards);
            document.getElementById('closeAll').addEventListener('click', closeAllCards);
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const body = document.body;
    const toggleBtn = document.getElementById('themeToggle');

    body.classList.add('light-mode');
    toggleBtn.textContent = 'Switch to Dark Mode';

    toggleBtn.addEventListener('click', function() {
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            toggleBtn.textContent = 'Switch to Light Mode';
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            toggleBtn.textContent = 'Switch to Dark Mode';
        }
    });
});
</script>
</body>
</html>
