<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Lakes, Swimming, and a Caveat - Vocabulary Cards</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #1a1a2e;
            color: #f0f0f0;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
        }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .vocab-card {
            background: linear-gradient(145deg, #2d2d44, #252536);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #39395a;
        }
        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border-color: #e94560;
        }
        .card-closed {
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #e94560;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-open {
            padding: 0;
            display: none;
        }
        .card-header {
            background-color: #e94560;
            color: white;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }
        .card-content {
            padding: 15px;
        }
        .definition {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #ccccdd;
        }
        .example {
            background-color: rgba(233, 69, 96, 0.1);
            border-left: 4px solid #e94560;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            line-height: 1.6;
            color: #aaccff;
        }
        .example-title {
            font-weight: bold;
            color: #e94560;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 8px 14px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ff5773;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #8888aa;
            font-size: 0.9rem;
        }
        .hint {
            text-align: center;
            margin-bottom: 20px;
            color: #8888aa;
            font-style: italic;
        }
body.light-mode {
    background-color: #f8f9fa;
    color: #1d1d1f;
}
body.light-mode h1 {
    color: #1e40af;
    text-shadow: 0 0 8px rgba(30, 64, 175, 0.25);
}
body.light-mode .vocab-card {
    background: linear-gradient(145deg, #ffffff, #f0f5ff);
    border: 1px solid #dbeafe;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
}
body.light-mode .vocab-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    border-color: #3b82f6;
}
body.light-mode .card-closed {
    color: #1e40af;
}
body.light-mode .card-header {
    background-color: #1e40af;
    color: white;
}
body.light-mode .definition {
    color: #1E40AF;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 20px;
    background-color: rgba(59, 130, 246, 0.10);
    padding: .2rem .3rem;
    border-radius: 0 10px 10px 0;
    border-left: 5px solid #3b82f6;
}
body.light-mode .example {
    border-left: 5px solid #3b82f6;
    padding: 16px 18px 16px 22px;
    border-radius: 0 10px 10px 0;
    color: #1e293b;
    line-height: 1.65;
    font-size: 1.08rem;
    font-weight: 500;
    margin: 16px 0;
}
body.light-mode .example-title {
    color: #1d4ed8;
}
body.light-mode button {
    background-color: #1d4ed8;
    color: white;
}
body.light-mode button:hover {
    background-color: #3b82f6;
}
body.light-mode .hint,
body.light-mode footer {
    color: #4b5563;
}
body.dark-mode {
    background-color: #1a1a2e;
    color: #f0f0f0;
}
body.dark-mode h1 {
    color: #e94560;
    text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
}
    </style>
</head>
<body>
    <h1>Great Lakes, Swimming, and a Caveat Vocabulary Cards</h1>
    <div class="hint">Click on any card to reveal the definition and example. Click again to close it.</div>

    <div class="controls">
        <button id="openAll">Open All Cards</button>
        <button id="closeAll">Close All Cards</button>
        <button id="themeToggle">Switch to Dark Mode</button>
    </div>

    <div class="cards-container" id="cardsContainer">
        <!-- Cards will be generated by JavaScript -->
    </div>

    <footer>
        Vocabulary extracted from "Great Lakes, Swimming, and a Caveat" text | Created for learning purposes
    </footer>

    <script>
        const vocabulary = [{"word": "massive", "definition": "Extremely large in size, amount, or extent.", "example": "A massive crowd gathered outside the stadium before the game even started."}, {"word": "surface", "definition": "The outer or top layer of something.", "example": "Oil floated on the surface of the water after the spill."}, {"word": "carved", "definition": "Cut or shaped over time, often forming a particular structure.", "example": "The river had carved a deep canyon into the rock over thousands of years."}, {"word": "situated", "definition": "Located in a particular place or position.", "example": "The old cabin was situated at the edge of a quiet forest."}, {"word": "vital", "definition": "Absolutely necessary or essential to something.", "example": "Regular exercise is vital for maintaining good health."}, {"word": "sustenance", "definition": "Food and drink regarded as a source of strength or nourishment.", "example": "The hikers packed enough sustenance for a full week in the mountains."}, {"word": "critical", "definition": "Extremely important; crucial.", "example": "Getting enough sleep is critical for staying focused at work."}, {"word": "species", "definition": "A group of living organisms that share common characteristics.", "example": "Scientists discovered a new species of frog deep in the rainforest."}, {"word": "draws", "definition": "Attracts people or things to a particular place.", "example": "The annual festival always draws huge crowds from neighboring towns."}, {"word": "generates", "definition": "Produces or creates something, especially income or energy.", "example": "The new factory generates hundreds of jobs for the local community."}, {"word": "economic activity", "definition": "Actions involving the production, buying, and selling of goods and services.", "example": "The holiday season always brings a sharp rise in economic activity downtown."}, {"word": "premier", "definition": "First in importance, status, or quality; leading.", "example": "The city is known as a premier destination for art lovers."}, {"word": "pristine", "definition": "In its original, perfectly clean or unspoiled condition.", "example": "The photos showed a pristine beach with no footprints in the sand."}, {"word": "caveats", "definition": "Warnings or cautions about specific limitations or conditions.", "example": "The contract came with several caveats that we needed to review carefully."}, {"word": "trapped", "definition": "Unable to escape from a place or situation.", "example": "The hikers were trapped on the mountain when the storm suddenly rolled in."}, {"word": "frequency", "definition": "The rate at which something happens over a period of time.", "example": "The frequency of buses increases during rush hour."}, {"word": "meteorologist", "definition": "A scientist who studies weather and climate.", "example": "The meteorologist predicted heavy rain for the entire weekend."}, {"word": "battering", "definition": "Hitting something repeatedly and with force.", "example": "Strong winds kept battering the small fishing boats all night."}, {"word": "wears you out", "definition": "(idiom) Makes someone feel very tired.", "example": "A full day of moving boxes really wears you out."}, {"word": "whipped up", "definition": "(phrasal verb) Suddenly created or stirred up, especially wind or excitement.", "example": "The storm whipped up huge waves along the coastline."}, {"word": "chaotic", "definition": "Completely disorganized or confused.", "example": "The airport was chaotic after dozens of flights were delayed at once."}, {"word": "recover", "definition": "To return to a normal state after a difficult event.", "example": "It took the town years to recover after the flood."}, {"word": "witnessed", "definition": "Saw something happen in person.", "example": "Several neighbors witnessed the accident from across the street."}, {"word": "struggle", "definition": "A difficult effort to achieve or resist something.", "example": "Learning a new language can be a real struggle at first."}, {"word": "desperately", "definition": "In a way that shows a great need or urgency.", "example": "The lost hiker desperately searched for a way back to the trail."}, {"word": "tricky", "definition": "Difficult to handle or deal with; requiring skill.", "example": "Parallel parking on a busy street can be tricky for new drivers."}, {"word": "currents", "definition": "Continuous flowing movements of water in a particular direction.", "example": "Strong currents near the river mouth make swimming dangerous."}, {"word": "hazardous", "definition": "Risky or dangerous, especially to health or safety.", "example": "Icy roads become extremely hazardous during winter storms."}, {"word": "caught off guard", "definition": "(idiom) Surprised by something unexpected; unprepared for it.", "example": "The sudden question caught her off guard during the interview."}, {"word": "transfer", "definition": "To move from one place, job, or organization to another.", "example": "She decided to transfer to a university closer to home."}, {"word": "intensity", "definition": "The extreme degree of strength, force, or feeling.", "example": "The intensity of the summer heat this year has been record-breaking."}, {"word": "fierce", "definition": "Extremely strong, powerful, or aggressive.", "example": "A fierce wind knocked down several trees along the coast."}, {"word": "respect", "definition": "To treat someone or something with proper consideration or admiration.", "example": "It's important to respect the rules of any place you visit."}];

        function createCards() {
            const container = document.getElementById('cardsContainer');

            vocabulary.forEach(item => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.dataset.word = item.word;

                const closedDiv = document.createElement('div');
                closedDiv.className = 'card-closed';
                closedDiv.textContent = item.word;

                const openDiv = document.createElement('div');
                openDiv.className = 'card-open';

                const header = document.createElement('div');
                header.className = 'card-header';
                header.textContent = item.word;

                const content = document.createElement('div');
                content.className = 'card-content';

                const definition = document.createElement('div');
                definition.className = 'definition';
                definition.innerHTML = `<strong>Definition:</strong> ${item.definition}`;

                const example = document.createElement('div');
                example.className = 'example';
                example.innerHTML = `<div class="example-title">Example</div>${item.example}`;

                content.appendChild(definition);
                content.appendChild(example);

                openDiv.appendChild(header);
                openDiv.appendChild(content);

                card.appendChild(closedDiv);
                card.appendChild(openDiv);

                card.addEventListener('click', function(e) {
                    if (e.target.tagName === 'BUTTON') return;

                    const isOpen = this.querySelector('.card-open').style.display === 'block';

                    if (isOpen) {
                        this.querySelector('.card-open').style.display = 'none';
                        this.querySelector('.card-closed').style.display = 'flex';
                    } else {
                        this.querySelector('.card-open').style.display = 'block';
                        this.querySelector('.card-closed').style.display = 'none';
                    }
                });

                container.appendChild(card);
            });
        }

        function openAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'block';
                card.querySelector('.card-closed').style.display = 'none';
            });
        }

        function closeAllCards() {
            document.querySelectorAll('.vocab-card').forEach(card => {
                card.querySelector('.card-open').style.display = 'none';
                card.querySelector('.card-closed').style.display = 'flex';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            createCards();

            document.getElementById('openAll').addEventListener('click', openAllCards);
            document.getElementById('closeAll').addEventListener('click', closeAllCards);
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const body = document.body;
    const toggleBtn = document.getElementById('themeToggle');

    body.classList.add('light-mode');
    toggleBtn.textContent = 'Switch to Dark Mode';

    toggleBtn.addEventListener('click', function() {
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            toggleBtn.textContent = 'Switch to Light Mode';
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            toggleBtn.textContent = 'Switch to Dark Mode';
        }
    });
});
</script>
</body>
</html>
